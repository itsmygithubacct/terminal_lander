name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Build (warnings are errors)
        run: make CFLAGS="-O2 -Wall -Wextra -Werror -std=c11 -D_DEFAULT_SOURCE -D_POSIX_C_SOURCE=200809L"

      - name: Selftests
        run: make test

      - name: Sanitized selftest (ASan + UBSan)
        run: |
          make clean
          make CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall -Wextra -Werror -std=c11 -D_DEFAULT_SOURCE -D_POSIX_C_SOURCE=200809L"
          ./terminal-lander --selftest 1337 1200
          ./terminal-lander --render-test 7
